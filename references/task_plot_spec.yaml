task_plot_spec:
  spec_version: "0.2"
  meta:
    task_name: Tapping Synchronization Task
    mode: existing
    task_id: T000044
  figure:
    output:
      filename: task_flow.png
      dpi: 300
      width_in: 6.4
      auto_width: false
      background: white
    layout:
      max_conditions: 4
      screens_per_timeline: 4
      screen_overlap_ratio: 0.04
      screen_slope: 0.04
      screen_slope_deg: 12.0
      timeline_gap: 0.18
      screen_aspect_ratio: 1.4545454545454546
      left_margin: 0.2
      right_margin: 0.03
      top_margin: 0.03
      bottom_margin: 0.05
      condition_label_gap: 0.014
      phase_label_pad: 0.01
      duration_label_gap: 0.006
      timeline_arrow_gap: 0.01
      timeline_arrow_screen_clearance: 0.007
      timeline_arrow_text_clearance: 0.01
      timeline_arrow_extra_per_screen: 0.015
      timeline_arrow_min_y: 0.02
      timeline_arrow_max_y: 0.96
  timelines:
    - condition: practice_600
      display_condition_label: Practice 600
      display_condition_note: Not scored
      phases:
        - phase_name: practice_ready
          display_phase_label: Ready
          duration_ms:
            fixed: 800
          response_window_ms: null
          display_timing_label: 0.8 s
          stim_ids:
            - practice_ready_text
          stimulus_example:
            summary: Practice begins
            modality: visual
            draw_hint: text
          notes: Practice-only readiness cue.
        - phase_name: practice_sync_tapping
          display_phase_label: Sync
          duration_ms:
            fixed: 6000
          response_window_ms:
            fixed: 6000
          display_timing_label: 10 × 600 ms = 6.0 s
          stim_ids:
            - fixation
            - metronome_tone
          stimulus_example:
            summary: "+ / 1319 Hz tone"
            modality: mixed
            draw_hint: mixed
            render_items:
              - kind: text
                text: "+"
                color: white
                pos: [0.0, 0.0]
                height: 48.0
              - kind: text
                text: "1319 Hz tone"
                color: "#d8e4ff"
                pos: [0.0, 135.0]
                height: 20.0
          notes: Fixation cross with a paced metronome tone.
        - phase_name: practice_continuation_tapping
          display_phase_label: Continuation
          duration_ms:
            fixed: 18000
          response_window_ms:
            fixed: 18000
          display_timing_label: 30 × 600 ms = 18.0 s
          stim_ids:
            - fixation
          stimulus_example:
            summary: "+"
            modality: visual
            draw_hint: text
          notes: Silent continuation after the tone stops.
        - phase_name: practice_break
          display_phase_label: Break
          duration_ms:
            fixed: 1200
          response_window_ms: null
          display_timing_label: 1.2 s
          stim_ids:
            - practice_break_text
          stimulus_example:
            summary: Practice break
            modality: visual
            draw_hint: text
          notes: Transition between practice and scored trials.
    - condition: tempo_450
